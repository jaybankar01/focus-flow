<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#12111a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Track ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/>
  <!-- Progress arc (~75% filled) -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#ring)" stroke-width="5"
    stroke-linecap="round"
    stroke-dasharray="138.23"
    stroke-dashoffset="34.56"
    transform="rotate(-90 32 32)"/>
  <!-- Center dot accent -->
  <circle cx="32" cy="32" r="4" fill="#f97316" opacity="0.9"/>
</svg>
